# Exemplo para /etc/nginx/sites-available/notes.gvvcapital.com
#
# Em muitos Ubuntu, mime.types NÃO declara .mjs → nginx usa application/octet-stream
# e o browser falha a carregar o worker do PDF.js ("fake worker failed" em produção).
# No dev, o Vite define o MIME correcto — por isso só falha no site.
#
# Aplicar: sudo cp deploy/notes.gvvcapital.com.nginx.conf /etc/nginx/sites-available/notes.gvvcapital.com
#          sudo nginx -t && sudo systemctl reload nginx

server {
    listen 3005;
    server_name _;

    root "/data/drive/Workspaces/4. Code/market-notes-haven/dist";
    index index.html;

    location / {
      try_files $uri $uri/ /index.html;
      add_header Cache-Control "no-cache, no-store, must-revalidate";
      add_header Pragma "no-cache";
    }

    location = /sw.js {
      add_header Cache-Control "no-cache, no-store, must-revalidate";
      add_header Service-Worker-Allowed "/";
    }

    # PDF.js / Vite: workers .mjs em /assets/
    location ~* ^/assets/.+\.mjs$ {
      default_type application/javascript;
      expires 1y;
      add_header Cache-Control "public, immutable";
    }

    location /assets/ {
      expires 1y;
      add_header Cache-Control "public, immutable";
    }

    location /api/ {
      proxy_pass http://127.0.0.1:3001/api/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
}
